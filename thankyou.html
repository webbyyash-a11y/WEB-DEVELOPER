<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You | WebbyYash</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0b0b;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
width:90%;
max-width:600px;
background:#181818;
padding:50px;
border-radius:20px;
text-align:center;
border:2px solid orange;
box-shadow:0 0 30px orange;
}

.check{
font-size:80px;
margin-bottom:20px;
animation:pop 1s ease;
}

h1{
color:orange;
font-size:42px;
margin-bottom:20px;
}

p{
color:#ddd;
font-size:20px;
line-height:32px;
margin-bottom:35px;
}

a{
display:inline-block;
padding:15px 40px;
background:orange;
color:#000;
text-decoration:none;
font-weight:bold;
border-radius:50px;
transition:.4s;
}

a:hover{
transform:translateY(-5px);
box-shadow:0 0 20px orange;
}

@keyframes pop{
0%{
transform:scale(0);
}
100%{
transform:scale(1);
}
}

</style>

</head>

<body>

<div class="container">

<div class="check">✅</div>

<h1>Thank You!</h1>

<p>
Your message has been sent successfully.<br>
Our team will contact you as soon as possible.
</p>

<a href="business-website.html">
Back to Home
</a>

</div>

</body>
</html>
